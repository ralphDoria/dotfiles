# --- General Quality of Life ---
set -g mouse on                  # Enable mouse scrolling and window/pane resizing
set -g history-limit 5000         # Increase scrollback buffer from 2000 to 5000 lines
set -s escape-time 0             # Eliminate delay when hitting the Esc key (crucial for Vim)

# --- Usability & Window Indexing ---
set -g base-index 1              # Start window numbering at 1 instead of 0
setw -g pane-base-index 1        # Start pane numbering at 1 instead of 0
set -g renumber-windows on       # Automatically renumber windows when one is closed

# --- Colors & Terminal Compatibility ---
set -g default-terminal "tmux-256color" # Ensure correct 256-color support inside tmux
set -as terminal-features ",xterm*:RGB" # Enable true 24-bit color support if terminal supports it

# --- Convenient Keybindings ---
# Easy config reload using: Prefix + r
unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes using logical visual cues: | and -
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

